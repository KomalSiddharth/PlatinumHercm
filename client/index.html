<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Platinum HRCM Dashboard</title>
    <meta name="description" content="Track your weekly HRCM progress, daily rituals, and course learning. Achieve Platinum Streak and level up your life with gamified personal development." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Delphi chat bubble configuration - set before loader script
      window.delphi = {
        bubble: {
          config: "00175779-acb8-4580-a7ec-8469446841a4",
          overrides: {
            landingPage: "OVERVIEW"
          },
          trigger: {
            color: "#bc0000"
          }
        }
      };
      console.log('[DELPHI] Configuration initialized:', window.delphi);
      
      // Hide chatbot on homepage/login pages
      if (window.location.pathname === '/' || window.location.pathname === '/login' || window.location.pathname === '/admin/login') {
        document.documentElement.setAttribute('data-hide-bubble', 'true');
      }
    </script>
    <script src="https://embed.delphi.ai/loader.js" async onload="console.log('[DELPHI] ✅ Loader script loaded')" onerror="console.error('[DELPHI] ❌ Failed to load loader script')"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
